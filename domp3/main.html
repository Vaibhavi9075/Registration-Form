<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" 
    integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" 
    crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <title>Document</title>
</head>
<body>
    
    <div class="container">
        <div class="main-container">
         <form action="" class="p-2">
         <label for="name" class="mb-2 mt-2">FullName</label>
         <input id="name" type ="text" name = "name" class="form-control mb-2" placeholder="Enter your Name" required>

         <label for="email" class = "mb-2">Email</label>
         <input id="email" type ="email" name="email" class="form-control mb-2" placeholder="Enter your email" required>

         <label for="Contact No" class = "mb-2">Contact No.</label>
         <input id="number" type ="number" name="number" class="form-control mb-2" placeholder="Enter your number" required>

         <label for="Address" class = "mb-2">Address</label>
         <input id="Address" type ="Address" name="Address" class="form-control mb-3" placeholder="Enter your Address" required>

         <div class="form-btn">
         <button type="submit" class="btn btn-dark">Back</button>
         <div>
            <button onClick="addData" type="submit" class="btn btn-danger">Add</button>
            <button type="submit" class="btn btn-dark">Update</button>
         </div>
         </div>
         <br><br>
         <div class="User-Container">
              <div class="userDetails">User Details</div>
         </div>
         </form>
         </div>
         
    </div>

</body>
</html>
